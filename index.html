<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Calculator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-900 flex items-center justify-center p-6"><div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-700"><div class="mb-6"><input type="text" id="display" readonly class="w-full bg-slate-950 text-white text-right text-4xl p-6 rounded-2xl border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500" value="0"></div><div class="grid grid-cols-4 gap-4"><button onclick="clearDisplay()" class="col-span-2 bg-red-900/50 text-red-200 p-4 rounded-xl hover:bg-red-800 transition">AC</button><button onclick="appendToDisplay('/')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">/</button><button onclick="appendToDisplay('*')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">*</button><button onclick="appendToDisplay('7')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">7</button><button onclick="appendToDisplay('8')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">8</button><button onclick="appendToDisplay('9')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">9</button><button onclick="appendToDisplay('-')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">-</button><button onclick="appendToDisplay('4')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">4</button><button onclick="appendToDisplay('5')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">5</button><button onclick="appendToDisplay('6')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">6</button><button onclick="appendToDisplay('+')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">+</button><button onclick="appendToDisplay('1')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">1</button><button onclick="appendToDisplay('2')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">2</button><button onclick="appendToDisplay('3')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">3</button><button onclick="calculateResult()" class="row-span-2 bg-blue-600 text-white p-4 rounded-xl hover:bg-blue-500 transition">=</button><button onclick="appendToDisplay('0')" class="col-span-2 bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">0</button><button onclick="appendToDisplay('.')" class="bg-slate-700 text-white p-4 rounded-xl hover:bg-slate-600 transition">.</button></div></div></div>
  
  <script src="script.js"></script>
</body>
</html>
