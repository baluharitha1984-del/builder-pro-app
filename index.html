<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel of Fortune</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-900 text-white flex flex-col items-center justify-center p-6"><h1 class="text-4xl font-bold mb-12 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">Decision Spinner</h1><div class="relative w-80 h-80"><div id="wheel" class="w-full h-full rounded-full border-8 border-slate-700 shadow-2xl transition-transform duration-[4000ms] ease-out relative overflow-hidden"></div><div class="absolute -top-4 left-1/2 transform -translate-x-1/2 w-6 h-8 bg-white rotate-180 clip-pointer z-10"></div></div><div class="mt-12 flex gap-4"><button id="spinBtn" class="px-8 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-full font-bold hover:scale-105 transition-transform">Spin It!</button><button id="addBtn" class="px-8 py-3 bg-slate-800 rounded-full font-bold hover:bg-slate-700">Add Option</button></div><div id="result" class="mt-8 text-2xl font-mono text-cyan-300"></div><div class="mt-8 w-full max-w-md bg-slate-800/50 p-6 rounded-2xl"><h2 class="text-sm font-semibold mb-4 text-slate-400">OPTIONS</h2><ul id="optionsList" class="space-y-2"></ul></div></div>
  
  <script src="script.js"></script>
</body>
</html>
