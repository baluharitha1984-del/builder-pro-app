<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClickQuest v1</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-900 text-white font-sans p-4 md:p-8"><header class="max-w-4xl mx-auto flex justify-between items-center mb-12"><h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">ClickQuest</h1><div class="flex items-center gap-6"><div class="text-center"><div class="text-sm text-slate-400 uppercase tracking-widest">Score</div><div id="score" class="text-2xl font-bold">0</div></div><button id="reset-btn" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition-all">Reset</button></div></header><main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8"><div id="game-zone" class="h-80 bg-slate-800 rounded-3xl border border-slate-700 flex items-center justify-center cursor-pointer hover:border-cyan-500 transition-all relative overflow-hidden group"><div id="click-target" class="w-24 h-24 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-full shadow-[0_0_50px_rgba(6,182,212,0.5)] transition-transform active:scale-95"></div><div id="feedback-text" class="absolute text-cyan-400 font-bold opacity-0 pointer-events-none">+1</div></div><div class="bg-slate-800 p-6 rounded-3xl border border-slate-700"><h2 class="text-xl font-semibold mb-4">Game Stats</h2><div class="space-y-4"><div class="flex justify-between"><span>Total Clicks</span><span id="total-clicks">0</span></div><div class="flex justify-between"><span>Session Time</span><span id="timer">0s</span></div><div class="flex justify-between"><span>Efficiency</span><span id="efficiency">0 c/s</span></div></div></div></main></div>
  
  <script src="script.js"></script>
</body>
</html>
