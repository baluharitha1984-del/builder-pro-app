<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronos Stopwatch</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-900 flex items-center justify-center p-6"><div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-700 text-center"><h1 class="text-4xl font-light text-slate-100 mb-8 tracking-widest uppercase">Chronos</h1><div id="display" class="text-7xl font-mono text-white mb-10 tabular-nums">00:00.00</div><div class="flex justify-center gap-4"><button id="startBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg shadow-emerald-900/20">Start</button><button id="stopBtn" class="bg-rose-600 hover:bg-rose-500 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg shadow-rose-900/20">Stop</button><button id="resetBtn" class="bg-slate-600 hover:bg-slate-500 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg shadow-slate-900/20">Reset</button></div><div id="laps" class="mt-8 pt-6 border-t border-slate-700 overflow-y-auto max-h-40"><h3 class="text-slate-400 text-sm uppercase mb-2">Lap Times</h3><ul id="lapList" class="space-y-2 text-slate-300"></ul></div></div></div>
  
  <script src="script.js"></script>
</body>
</html>
