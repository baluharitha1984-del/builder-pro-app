<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Bad Game</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-900 text-white font-sans p-6 md:p-12"><header class="text-center mb-16"><h1 class="text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-500 mb-4">The Good/Bad Game</h1><p class="text-slate-400 max-w-xl mx-auto">A whimsical decision helper. Is it actually good, or just 'so bad it's good'?</p></header><div class="max-w-4xl mx-auto grid md:grid-cols-2 gap-8"><div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl"><h2 class="text-xl font-bold mb-6 text-emerald-400">Add Subject</h2><div class="space-y-4"><input type="text" id="subjectInput" placeholder="e.g. Pineapple on Pizza" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:border-emerald-500 transition-all"><div class="flex gap-4"><button id="markGood" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold transition-all transform active:scale-95">It's Good</button><button id="markBad" class="flex-1 py-3 bg-rose-600 hover:bg-rose-500 rounded-xl font-bold transition-all transform active:scale-95">It's Bad</button></div></div></div><div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-xl"><h2 class="text-xl font-bold mb-6 text-cyan-400">Your List</h2><div id="listContainer" class="space-y-3 h-64 overflow-y-auto pr-2 custom-scrollbar"><p id="emptyMsg" class="text-slate-500 italic text-center mt-20">Your list is empty...</p></div></div></div></div>
  
  <script src="script.js"></script>
</body>
</html>
