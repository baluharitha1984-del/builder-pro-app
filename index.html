<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoodlePad Kids</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-50 p-4 md:p-8 flex flex-col items-center"><header class="mb-8 text-center"><h1 class="text-4xl font-extrabold text-indigo-600 mb-2">DoodlePad Kids</h1><p class="text-slate-500">Unleash your imagination!</p></header><div class="flex flex-col md:flex-row gap-6 w-full max-w-5xl"><aside class="bg-white p-6 rounded-2xl shadow-xl flex flex-col gap-4 border border-slate-100"><div class="flex flex-wrap gap-2 justify-center"><button class="w-10 h-10 rounded-full bg-red-500 border-4 border-transparent hover:border-black" onclick="setColor('red')"></button><button class="w-10 h-10 rounded-full bg-blue-500 border-4 border-transparent hover:border-black" onclick="setColor('blue')"></button><button class="w-10 h-10 rounded-full bg-green-500 border-4 border-transparent hover:border-black" onclick="setColor('green')"></button><button class="w-10 h-10 rounded-full bg-yellow-400 border-4 border-transparent hover:border-black" onclick="setColor('yellow')"></button><button class="w-10 h-10 rounded-full bg-purple-500 border-4 border-transparent hover:border-black" onclick="setColor('purple')"></button><button class="w-10 h-10 rounded-full bg-black border-4 border-transparent hover:border-black" onclick="setColor('black')"></button></div><div class="space-y-2"><label class="text-sm font-bold">Brush Size</label><input type="range" id="brushSize" min="2" max="20" value="5" class="w-full"></div><button id="clearBtn" class="mt-4 w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all">Clear Canvas</button></aside><main class="flex-1 bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 cursor-crosshair"><canvas id="artCanvas" class="w-full h-[500px]"></canvas></main></div></div>
  
  <script src="script.js"></script>
</body>
</html>
