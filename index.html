<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CanvasArc</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-neutral-950 text-neutral-100 p-4 md:p-8"><header class="flex justify-between items-center pb-8 border-b border-neutral-800 mb-8"><h1 class="text-4xl font-black tracking-tighter">CanvasArc</h1><div class="flex gap-4"><button id="clear-btn" class="px-4 py-2 bg-neutral-800 hover:bg-neutral-700 rounded-xl transition-all">Clear</button><input type="color" id="color-picker" class="w-10 h-10 rounded-full cursor-pointer bg-transparent border-0"></div></header><main class="grid grid-cols-1 lg:grid-cols-4 gap-8"><div class="lg:col-span-3 bg-neutral-900 rounded-3xl p-4 shadow-2xl border border-neutral-800"><canvas id="art-canvas" class="w-full h-[600px] cursor-crosshair"></canvas></div><aside class="space-y-6"><div class="bg-neutral-900 p-6 rounded-3xl border border-neutral-800"><h2 class="font-bold mb-4">Brush Controls</h2><label class="block text-sm mb-2">Size: <span id="size-val">5</span></label><input type="range" id="brush-size" min="1" max="50" value="5" class="w-full accent-indigo-500"></div><div class="bg-neutral-900 p-6 rounded-3xl border border-neutral-800"><h2 class="font-bold mb-4">Instructions</h2><p class="text-neutral-400 text-sm">Click and drag on the canvas to paint. Use the controls above to adjust your stroke. Your masterpiece persists in the current session.</p></div></aside></main></div>
  
  <script src="script.js"></script>
</body>
</html>
