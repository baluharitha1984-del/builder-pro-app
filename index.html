<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GradeBook Pro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-50 p-6 md:p-12 font-sans text-slate-900"><div class="max-w-4xl mx-auto"><header class="mb-8"><h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">GradeBook Pro</h1><p class="text-slate-500">Manage student assessments with ease.</p></header><div class="grid md:grid-cols-3 gap-8"><div class="md:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 h-fit"><h2 class="text-lg font-bold mb-4">Add New Entry</h2><div class="space-y-4"><div><label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Student Name</label><input type="text" id="studentName" class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition"></div><div><label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Subject</label><input type="text" id="subjectName" class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition"></div><div><label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Score (0-100)</label><input type="number" id="scoreValue" class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition"></div><button id="addEntryBtn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition active:scale-95">Save Entry</button></div></div><div class="md:col-span-2"><div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden"><table class="w-full text-left"><thead class="bg-slate-50"><tr><th class="p-4 text-xs font-bold text-slate-400 uppercase">Student</th><th class="p-4 text-xs font-bold text-slate-400 uppercase">Subject</th><th class="p-4 text-xs font-bold text-slate-400 uppercase">Score</th><th class="p-4 text-xs font-bold text-slate-400 uppercase">Action</th></tr></thead><tbody id="entryList"></tbody></table><div id="emptyState" class="p-12 text-center text-slate-400">No entries added yet.</div></div></div></div></div></div>
  
  <script src="script.js"></script>
</body>
</html>
