<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FractionMaster</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="max-w-4xl mx-auto p-6 md:p-12 font-sans text-slate-900"><header class="mb-10 text-center"><h1 class="text-4xl font-extrabold tracking-tight text-indigo-900 mb-2">FractionMaster</h1><p class="text-slate-500">Explore, visualize, and calculate fractions effortlessly.</p></header><div class="grid md:grid-cols-2 gap-8"><div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100"><h2 class="text-xl font-bold mb-6">Fraction Visualizer</h2><div class="flex flex-col gap-6"><div class="flex items-center gap-4"><input type="number" id="num1" placeholder="1" class="w-20 p-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 outline-none text-center font-bold"><div class="h-1 w-8 bg-slate-300"></div><input type="number" id="den1" placeholder="2" class="w-20 p-3 border-2 border-slate-200 rounded-xl focus:border-indigo-500 outline-none text-center font-bold"></div><div id="visual-box" class="h-48 border-4 border-dashed border-indigo-100 rounded-2xl flex items-center justify-center p-4 bg-indigo-50/50"></div><button id="render-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all">Visualize Fraction</button></div></div><div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100"><h2 class="text-xl font-bold mb-6">Fraction Calculator</h2><div class="space-y-4"><div class="flex items-center justify-between gap-2"><input type="number" id="calc-n1" class="w-16 p-2 border rounded-lg text-center"><div class="text-xl font-bold">/</div><input type="number" id="calc-d1" class="w-16 p-2 border rounded-lg text-center"><span>+</span><input type="number" id="calc-n2" class="w-16 p-2 border rounded-lg text-center"><div class="text-xl font-bold">/</div><input type="number" id="calc-d2" class="w-16 p-2 border rounded-lg text-center"><button id="calc-btn" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold">=</button></div><div id="result-box" class="mt-6 p-4 bg-emerald-50 text-emerald-900 rounded-xl border border-emerald-200 font-mono text-center hidden font-bold text-lg">Result appears here</div></div></div></div></div>
  
  <script src="script.js"></script>
</body>
</html>
