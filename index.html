<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Studio</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-50 p-6 md:p-12 font-sans text-slate-900"> <header class="max-w-5xl mx-auto mb-12 flex justify-between items-center"> <div> <h1 class="text-3xl font-bold tracking-tight text-slate-900">Banner Studio</h1> <p class="text-slate-500">Create and preview professional banners</p> </div> <button id="add-banner-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-medium transition-all shadow-lg shadow-indigo-200">Add Banner</button> </header> <main class="max-w-5xl mx-auto"> <div id="banner-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div> </main> </div> <div id="modal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center p-4 backdrop-blur-sm z-50"> <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl"> <h2 class="text-xl font-bold mb-6">New Banner</h2> <div class="space-y-4"> <input id="title-input" type="text" placeholder="Banner Title" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"> <textarea id="desc-input" placeholder="Description..." class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none h-24"></textarea> <div class="flex gap-3 justify-end mt-6"> <button id="cancel-btn" class="px-4 py-2 text-slate-600 hover:text-slate-900">Cancel</button> <button id="save-btn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Save</button> </div> </div> </div> </div>
  
  <script src="script.js"></script>
</body>
</html>
