<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordDash</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-50 p-4 md:p-8 flex flex-col items-center"><header class="mb-8 text-center"><h1 class="text-4xl font-extrabold text-slate-900">WordDash</h1><p class="text-slate-500">Guess the secret 5-letter word</p></header><div id="game-board" class="grid grid-rows-6 gap-2 mb-8"></div><div class="w-full max-w-sm"><div id="message-area" class="h-12 mb-4 text-center font-bold text-lg"></div><div class="flex gap-2"><input type="text" id="word-input" maxlength="5" class="w-full p-4 text-2xl border-2 border-slate-200 rounded-xl uppercase tracking-widest text-center focus:border-indigo-500 outline-none" placeholder="ENTER WORD"><button id="submit-btn" class="bg-indigo-600 text-white px-6 rounded-xl font-bold hover:bg-indigo-700 transition-colors">GUESS</button></div></div></div>
  
  <script src="script.js"></script>
</body>
</html>
