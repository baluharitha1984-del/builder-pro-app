<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlassCalc</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl shadow-2xl p-6 w-full max-w-sm border border-slate-100">
    <div class="mb-6 text-right">
      <div id="prev-display" class="text-slate-400 text-sm h-6 overflow-hidden"></div>
      <div id="display" class="text-4xl font-semibold text-slate-800 tracking-tight truncate">0</div>
    </div>
    <div class="grid grid-cols-4 gap-3">
      <button onclick="clearDisplay()" class="col-span-2 bg-rose-50 text-rose-500 hover:bg-rose-100 p-4 rounded-2xl font-bold transition-all">AC</button>
      <button onclick="appendOperator('/')" class="bg-slate-100 text-slate-600 hover:bg-slate-200 p-4 rounded-2xl font-bold transition-all">÷</button>
      <button onclick="appendOperator('*')" class="bg-slate-100 text-slate-600 hover:bg-slate-200 p-4 rounded-2xl font-bold transition-all">×</button>
      <button onclick="appendNumber('7')" class="bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl font-semibold transition-all">7</button>
      <button onclick="appendNumber('8')" class="bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl font-semibold transition-all">8</button>
      <button onclick="appendNumber('9')" class="bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl font-semibold transition-all">9</button>
      <button onclick="appendOperator('-')" class="bg-slate-100 text-slate-600 hover:bg-slate-200 p-4 rounded-2xl font-bold transition-all">-</button>
      <button onclick="appendNumber('4')" class="bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl font-semibold transition-all">4</button>
      <button onclick="appendNumber('5')" class="bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl font-semibold transition-all">5</button>
      <button onclick="appendNumber('6')" class="bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl font-semibold transition-all">6</button>
      <button onclick="appendOperator('+')" class="bg-slate-100 text-slate-600 hover:bg-slate-200 p-4 rounded-2xl font-bold transition-all">+</button>
      <button onclick="appendNumber('1')" class="bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl font-semibold transition-all">1</button>
      <button onclick="appendNumber('2')" class="bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl font-semibold transition-all">2</button>
      <button onclick="appendNumber('3')" class="bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl font-semibold transition-all">3</button>
      <button onclick="calculate()" class="row-span-2 bg-indigo-600 text-white hover:bg-indigo-700 p-4 rounded-2xl font-bold transition-all">=</button>
      <button onclick="appendNumber('0')" class="col-span-2 bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl font-semibold transition-all">0</button>
      <button onclick="appendDecimal('.')" class="bg-slate-50 hover:bg-slate-100 p-4 rounded-2xl font-semibold transition-all">.</button>
    </div>
  </div>
</div>
  
  <script src="script.js"></script>
</body>
</html>
