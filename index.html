<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HighLow Arena</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 space-y-8">
    <div class="text-center">
      <h1 class="text-3xl font-extrabold text-slate-900">Big or Small?</h1>
      <p class="text-slate-500 mt-2">Predict if the next number will be higher or lower.</p>
    </div>
    <div id="game-board" class="flex flex-col items-center justify-center py-8 border-4 border-slate-100 rounded-2xl">
      <span id="current-number" class="text-7xl font-mono font-bold text-indigo-600">--</span>
      <p class="text-sm text-slate-400 uppercase tracking-widest mt-2">Current Number</p>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <button id="btn-low" class="py-4 px-6 bg-red-500 hover:bg-red-600 active:scale-95 transition-all text-white font-bold rounded-xl shadow-lg shadow-red-200">
        LOWER
      </button>
      <button id="btn-high" class="py-4 px-6 bg-emerald-500 hover:bg-emerald-600 active:scale-95 transition-all text-white font-bold rounded-xl shadow-lg shadow-emerald-200">
        HIGHER
      </button>
    </div>
    <div id="result-msg" class="text-center font-medium min-h-[1.5rem]"></div>
    <div class="flex justify-between items-center text-sm border-t pt-6">
      <div>Score: <span id="score" class="font-bold text-indigo-600">0</span></div>
      <button id="btn-reset" class="text-slate-400 hover:text-slate-800 transition-colors underline">Reset Game</button>
    </div>
  </div>
</div>
  
  <script src="script.js"></script>
</body>
</html>
