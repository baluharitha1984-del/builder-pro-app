<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpinWheel Pro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-900 text-white flex flex-col items-center justify-center p-6">
  <header class="mb-12 text-center">
    <h1 class="text-4xl font-extrabold tracking-tight mb-2">Spin & Decide</h1>
    <p class="text-slate-400">Add your items, spin the wheel, and let fate decide.</p>
  </header>

  <div class="flex flex-col lg:flex-row gap-12 w-full max-w-5xl items-center">
    <div class="relative flex flex-col items-center">
      <div id="wheel-container" class="relative w-80 h-80 sm:w-[400px] sm:h-[400px]">
        <canvas id="wheel" width="800" height="800" class="w-full h-full"></canvas>
        <div class="absolute -top-4 left-1/2 -translate-x-1/2 w-8 h-8 bg-white rotate-45 border-t-2 border-l-2 border-slate-700 z-10"></div>
      </div>
      <button id="spin-btn" class="mt-10 px-8 py-4 bg-indigo-600 hover:bg-indigo-500 rounded-full font-bold text-lg shadow-lg transition-all active:scale-95">SPIN NOW</button>
    </div>

    <div class="w-full max-w-md bg-slate-800 p-8 rounded-2xl shadow-xl">
      <h2 class="text-xl font-bold mb-4">Entries</h2>
      <div class="flex gap-2 mb-6">
        <input id="item-input" type="text" placeholder="Enter an item..." class="flex-1 bg-slate-700 border-none rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500">
        <button id="add-btn" class="px-4 py-2 bg-emerald-600 rounded-lg hover:bg-emerald-500">Add</button>
      </div>
      <ul id="item-list" class="space-y-2 max-h-64 overflow-y-auto pr-2 custom-scrollbar"></ul>
    </div>
  </div>
</div>
  
  <script src="script.js"></script>
</body>
</html>
