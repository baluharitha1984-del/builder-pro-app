<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenCalc</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-900 flex items-center justify-center p-6"><div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-700"><div class="mb-6"><input type="text" id="display" readonly class="w-full bg-slate-950 text-white text-right text-4xl p-4 rounded-xl border border-slate-700 focus:outline-none" value="0"></div><div class="grid grid-cols-4 gap-3"><button onclick="clearDisplay()" class="col-span-2 p-4 bg-red-900/50 hover:bg-red-800 text-red-200 rounded-2xl font-bold transition">AC</button><button onclick="deleteLast()" class="p-4 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-2xl font-bold transition">DEL</button><button onclick="appendToDisplay('/')" class="p-4 bg-amber-600 hover:bg-amber-500 text-white rounded-2xl font-bold transition">/</button><button onclick="appendToDisplay('7')" class="p-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold transition">7</button><button onclick="appendToDisplay('8')" class="p-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold transition">8</button><button onclick="appendToDisplay('9')" class="p-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold transition">9</button><button onclick="appendToDisplay('*')" class="p-4 bg-amber-600 hover:bg-amber-500 text-white rounded-2xl font-bold transition">×</button><button onclick="appendToDisplay('4')" class="p-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold transition">4</button><button onclick="appendToDisplay('5')" class="p-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold transition">5</button><button onclick="appendToDisplay('6')" class="p-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold transition">6</button><button onclick="appendToDisplay('-')" class="p-4 bg-amber-600 hover:bg-amber-500 text-white rounded-2xl font-bold transition">-</button><button onclick="appendToDisplay('1')" class="p-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold transition">1</button><button onclick="appendToDisplay('2')" class="p-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold transition">2</button><button onclick="appendToDisplay('3')" class="p-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold transition">3</button><button onclick="appendToDisplay('+')" class="p-4 bg-amber-600 hover:bg-amber-500 text-white rounded-2xl font-bold transition">+</button><button onclick="appendToDisplay('0')" class="col-span-2 p-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold transition">0</button><button onclick="appendToDisplay('.')" class="p-4 bg-slate-700 hover:bg-slate-600 text-white rounded-2xl font-bold transition">.</button><button onclick="calculateResult()" class="p-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl font-bold transition">=</button></div></div></div>
  
  <script src="script.js"></script>
</body>
</html>
