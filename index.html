<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathLeap</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-50 p-6 md:p-12 font-sans text-slate-900"><header class="mb-12"><h1 class="text-4xl font-extrabold tracking-tight text-slate-900">MathLeap</h1><p class="text-slate-600 mt-2">Master mathematics through adaptive practice.</p></header><main class="grid grid-cols-1 lg:grid-cols-3 gap-8"><section id="practice-section" class="lg:col-span-2 bg-white p-8 rounded-2xl shadow-sm border border-slate-200"><div id="quiz-container" class="space-y-6"><div id="question-box" class="text-5xl font-bold text-indigo-600">Click Start</div><input type="number" id="answer-input" placeholder="Enter your answer" class="w-full p-4 text-xl border-2 border-slate-200 rounded-xl focus:border-indigo-500 outline-none transition-all" /><button id="submit-btn" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-200">Check Answer</button><button id="next-btn" class="hidden w-full py-4 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200">Next Question</button></div></section><aside class="space-y-6"><div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200"><h3 class="font-bold text-slate-400 uppercase text-xs tracking-widest mb-4">Progress</h3><div class="text-4xl font-black text-slate-800" id="score-display">0</div><p class="text-sm text-slate-500">Correct answers streak</p></div><div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200"><h3 class="font-bold text-slate-400 uppercase text-xs tracking-widest mb-4">Dashboard</h3><div class="space-y-3"><div class="flex justify-between"><span>Difficulty</span><span class="font-medium">Beginner</span></div><div class="flex justify-between"><span>Status</span><span class="text-emerald-500 font-medium" id="status-indicator">Ready</span></div></div></div></aside></main></div>
  
  <script src="script.js"></script>
</body>
</html>
