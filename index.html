<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeluguMelodies</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;450;600;800&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="min-h-screen bg-slate-950 text-white font-sans p-4 md:p-8"><header class="mb-10"><h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500">TeluguMelodies</h1><p class="text-slate-400 mt-2">Your gateway to the golden hits of Tollywood.</p></header><div class="grid grid-cols-1 md:grid-cols-3 gap-6"><section id="player-card" class="md:col-span-1 bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-2xl"><div class="flex flex-col items-center text-center"><div id="album-art" class="w-48 h-48 bg-slate-800 rounded-xl mb-6 shadow-inner flex items-center justify-center"><i class="fas fa-music text-5xl text-teal-500"></i></div><h2 id="now-playing-title" class="text-xl font-bold">Select a song</h2><p id="now-playing-artist" class="text-slate-400 mb-6">Artist Name</p><div class="w-full flex justify-center gap-4 text-3xl"><button id="prev-btn" class="hover:text-teal-400 transition-colors"><i class="fas fa-step-backward"></i></button><button id="play-pause-btn" class="bg-teal-500 hover:bg-teal-400 w-16 h-16 rounded-full text-slate-900 transition-transform hover:scale-105"><i class="fas fa-play"></i></button><button id="next-btn" class="hover:text-teal-400 transition-colors"><i class="fas fa-step-forward"></i></button></div></div></section><section class="md:col-span-2 bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-2xl"><h2 class="text-2xl font-bold mb-6">Trending Songs</h2><ul id="song-list" class="space-y-3"></ul></section></div></div>
  
  <script src="script.js"></script>
</body>
</html>
