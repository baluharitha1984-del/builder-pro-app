name: Build Google Play Store App
'on':
  push:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  build:
    name: Compile Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Detect and Setup Project
        id: setup_project
        run: |-
          if [ -f "gradlew" ]; then
            echo "PROJECT_TYPE=native-android" >> $GITHUB_ENV
            echo "Detected native Android project."
          elif [ -f "android/gradlew" ]; then
            echo "PROJECT_TYPE=existing-capacitor" >> $GITHUB_ENV
            echo "Detected existing Capacitor Android project."
          else
            echo "PROJECT_TYPE=html-pwa" >> $GITHUB_ENV
            echo "Detected HTML/PWA project. Building Capacitor Android wrapper..."
            
            # Initialize package.json if not present
            if [ ! -f "package.json" ]; then
              npm init -y
            fi
            
            # Install Capacitor CLI, core, and Android platform
            npm install @capacitor/core @capacitor/cli @capacitor/android
            
            # Prepare static web assets directory
            mkdir -p www
            
            # Copy static files to web assets directory, avoiding copying the www directory into itself
            find . -maxdepth 1 -type f -not -name "package.json" -not -name "package-lock.json" -not -name "yarn.lock" -not -name "package-lock.json" -exec cp {} www/ \; || true
            
            # Copy separate directories if present
            for dir in assets images css js static public; do
              if [ -d "$dir" ] && [ "$dir" != "www" ]; then
                cp -r "$dir" www/ || true
              fi
            done
            
            # Retrieve dynamic config appId and appName
            APP_NAME=$(node -p "try { require('./capacitor.config.json').appName || 'Applet' } catch { 'Applet' }")
            APP_ID=$(node -p "try { require('./capacitor.config.json').appId || 'com.pwa.app' } catch { 'com.pwa.app' }")
            
            # Initialize Capacitor using dynamic values
            npx cap init "$APP_NAME" "$APP_ID" --web-dir=www || true
            npx cap add android || true

            # Patch dynamically generated Gradle files on the fly to fix Kotlin duplicate class conflicts
            node -e "
            const fs = require('fs');
            if (fs.existsSync('android/build.gradle')) {
              let content = fs.readFileSync('android/build.gradle', 'utf8');
              if (!content.includes('resolutionStrategy.eachDependency')) {
                content += '\n\nsubprojects {\n    configurations.all {\n        resolutionStrategy.eachDependency { details ->\n            if (details.requested.group == \"org.jetbrains.kotlin\") {\n                details.useVersion \"1.8.22\"\n            }\n         }\n    }\n}\n';
                fs.writeFileSync('android/build.gradle', content);
              }
            }
            if (fs.existsSync('android/app/build.gradle')) {
              let content = fs.readFileSync('android/app/build.gradle', 'utf8');
              content = content.replace(/.*kotlin-stdlib-jdk7.*/g, '');
              content = content.replace(/.*kotlin-stdlib-jdk8.*/g, '');
              if (!content.includes('kotlin-stdlib-jdk7')) {
                content += '\n\nconfigurations.all {\n    exclude group: \"org.jetbrains.kotlin\", module: \"kotlin-stdlib-jdk7\"\n    exclude group: \"org.jetbrains.kotlin\", module: \"kotlin-stdlib-jdk8\"\n}\n';
              }
              fs.writeFileSync('android/app/build.gradle', content);
            }
            "

            npx cap sync android
          fi
      - name: Configure Unique Android Naming and Identifiers
        run: |
          cat << 'EOF' > configure_package.js
          const fs = require('fs');
          const path = require('path');

          console.log('=== ANDROID PACKAGE PERMANENT CONFLICT RESOLVER ===');

          const runNumStr = process.env.GITHUB_RUN_NUMBER || '';
          let suffix = '';
          if (runNumStr) {
            suffix = runNumStr.padStart(3, '0');
          } else {
            const now = new Date();
            suffix = String(now.getHours()).padStart(2, '0') + 
                     String(now.getMinutes()).padStart(2, '0') + 
                     String(now.getSeconds()).padStart(2, '0');
          }

          const uniqueAppId = "com.builderpro.app" + suffix;
          console.log("Target Package Name/ApplicationId: " + uniqueAppId);

          let appName = 'Applet';
          if (fs.existsSync('capacitor.config.json')) {
            try {
              const config = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
              if (config.appName) appName = config.appName;
            } catch (e) {}
          } else if (fs.existsSync('package.json')) {
            try {
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              if (pkg.name) {
                appName = pkg.name.split(/[-_]/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
              }
            } catch (e) {}
          }

          const cleanAppName = appName.trim() || 'Applet';
          const uniqueAppLabel = cleanAppName + ' ' + suffix;
          console.log("Target App Label: " + uniqueAppLabel);

          const versionCode = runNumStr ? parseInt(runNumStr, 10) : Math.floor(Date.now() / 1000) % 2000000000;
          console.log("Target Version Code: " + versionCode);

          if (fs.existsSync('capacitor.config.json')) {
            try {
              const data = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
              data.appId = uniqueAppId;
              data.appName = uniqueAppLabel;
              fs.writeFileSync('capacitor.config.json', JSON.stringify(data, null, 2), 'utf8');
              console.log('Updated capacitor.config.json.');
            } catch(e) {
              console.error('Error modifying capacitor.config.json:', e);
            }
          }

          let originalPackage = '';
          const manifestPaths = [
            'android/app/src/main/AndroidManifest.xml',
            'app/src/main/AndroidManifest.xml',
            'android/app/AndroidManifest.xml',
            'app/AndroidManifest.xml'
          ];

          let targetManifestPath = '';
          for (const p of manifestPaths) {
            if (fs.existsSync(p)) {
              targetManifestPath = p;
              try {
                const content = fs.readFileSync(p, 'utf8');
                const match = content.match(/package="([^"]+)"/);
                if (match) {
                  originalPackage = match[1];
                  console.log("Found original package name: " + originalPackage);
                }
              } catch (e) {}
              break;
            }
          }

          if (!originalPackage) {
            originalPackage = 'com.pwa.app';
          }

          if (targetManifestPath) {
            try {
              let content = fs.readFileSync(targetManifestPath, 'utf8');
              if (content.includes('package=')) {
                content = content.replace(/package="[^"]+"/g, 'package="' + uniqueAppId + '"');
              } else {
                content = content.replace('<manifest', '<manifest package="' + uniqueAppId + '"');
              }
              fs.writeFileSync(targetManifestPath, content, 'utf8');
              console.log('Updated AndroidManifest.xml package attribute.');
            } catch (e) {
              console.error('Error modifying AndroidManifest.xml:', e);
            }
          }

          const stringsPaths = [
            'android/app/src/main/res/values/strings.xml',
            'app/src/main/res/values/strings.xml'
          ];
          for (const p of stringsPaths) {
            if (fs.existsSync(p)) {
              try {
                let content = fs.readFileSync(p, 'utf8');
                content = content.replace(/<string\\s+name="app_name">.*?<\\/string>/g, '<string name="app_name">' + uniqueAppLabel + '</string>');
                content = content.replace(/<string\\s+name="title_activity_main">.*?<\\/string>/g, '<string name="title_activity_main">' + uniqueAppLabel + '</string>');
                fs.writeFileSync(p, content, 'utf8');
                console.log("Updated strings.xml: " + p);
              } catch (e) {
                console.error("Error modifying strings.xml: " + p, e);
              }
            }
          }

          const gradlePaths = [
            'android/app/build.gradle',
            'app/build.gradle'
          ];
          for (const p of gradlePaths) {
            if (fs.existsSync(p)) {
              try {
                let content = fs.readFileSync(p, 'utf8');
                content = content.replace(/namespace\\s+['"][^'"]+['"]/g, 'namespace "' + uniqueAppId + '"');
                content = content.replace(/applicationId\\s+['"][^'"]+['"]/g, 'applicationId "' + uniqueAppId + '"');
                content = content.replace(/versionCode\\s+\\d+/g, 'versionCode ' + versionCode);
                fs.writeFileSync(p, content, 'utf8');
                console.log("Updated build.gradle: " + p);
              } catch (e) {
                console.error("Error modifying build.gradle: " + p, e);
              }
            }
          }

          const baseJavaDirs = [
            'android/app/src/main/java',
            'app/src/main/java'
          ];

          function getAllFiles(dirPath, arrayOfFiles) {
            const files = fs.readdirSync(dirPath);
            arrayOfFiles = arrayOfFiles || [];
            files.forEach(function(file) {
              if (fs.statSync(dirPath + "/" + file).isDirectory()) {
                arrayOfFiles = getAllFiles(dirPath + "/" + file, arrayOfFiles);
              } else {
                arrayOfFiles.push(path.join(dirPath, "/", file));
              }
            });
            return arrayOfFiles;
          }

          for (const baseJavaDir of baseJavaDirs) {
            if (fs.existsSync(baseJavaDir)) {
              try {
                const files = getAllFiles(baseJavaDir);
                const javaKotlinFiles = files.filter(f => f.endsWith('.java') || f.endsWith('.kt'));
                
                for (const file of javaKotlinFiles) {
                  let content = fs.readFileSync(file, 'utf8');
                  if (content.includes("package " + originalPackage)) {
                    content = content.split("package " + originalPackage).join("package " + uniqueAppId);
                    fs.writeFileSync(file, content, 'utf8');
                    console.log("Updated package declaration inside: " + file);
                  }
                }

                const oldPackagePath = path.join(baseJavaDir, ...originalPackage.split('.'));
                const newPackagePath = path.join(baseJavaDir, ...uniqueAppId.split('.'));
                
                if (fs.existsSync(oldPackagePath) && oldPackagePath !== newPackagePath) {
                  fs.mkdirSync(newPackagePath, { recursive: true });
                  const oldFiles = fs.readdirSync(oldPackagePath);
                  for (const f of oldFiles) {
                    const src = path.join(oldPackagePath, f);
                    const dest = path.join(newPackagePath, f);
                    if (fs.statSync(src).isFile()) {
                      fs.renameSync(src, dest);
                      console.log("Moved file to new package folder: " + dest);
                    }
                  }
                  let inspectDir = oldPackagePath;
                  while (inspectDir !== baseJavaDir) {
                    try {
                      if (fs.readdirSync(inspectDir).length === 0) {
                        fs.rmdirSync(inspectDir);
                        inspectDir = path.dirname(inspectDir);
                      } else {
                        break;
                      }
                    } catch (e) {
                      break;
                    }
                  }
                }
              } catch (e) {
                console.error('Error during package file migration:', e);
              }
            }
          }

          console.log('=== LOGGING THE FINAL GENERATED PACKAGE NAME ===');
          console.log("FINAL_APPLICATION_ID: " + uniqueAppId);
          console.log('================================================');
          EOF
          node configure_package.js
          rm configure_package.js

          # Regenerate Android platform config after package change
          if command -v npx >/dev/null 2>&1 && [ -f "capacitor.config.json" ]; then
            echo "Regenerating Android Capacitor project mapping..."
            npx cap sync android
          fi
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle
      - name: Compile and Package App using Gradle
        run: |-
          if [ "${{ env.PROJECT_TYPE }}" = "native-android" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
            ./gradlew bundleRelease
          elif [ "${{ env.PROJECT_TYPE }}" = "existing-capacitor" ] || [ "${{ env.PROJECT_TYPE }}" = "html-pwa" ]; then
            chmod +x android/gradlew
            cd android
            ./gradlew assembleDebug
            ./gradlew bundleRelease
            cd ..
          else
            echo "Unknown build environment type."
            exit 1
          fi
      - name: Upload Debug APK Binary
        uses: actions/upload-artifact@v4
        with:
          name: play-ready-debug-apk
          path: |-
            **/*.apk
            !**/node_modules/**
      - name: Upload Release Play Store Bundle (AAB)
        uses: actions/upload-artifact@v4
        with:
          name: play-ready-release-aab
          path: |-
            **/*.aab
            !**/node_modules/**
